<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpô</title>


    <link rel="stylesheet" href="/css/estilo.css">
    <!--link rel="stylesheet" type="text/css" href="css/all-animation.css"/-->
    <link rel="stylesheet" href="https://unpkg.com/all-animation/dist/all-animation.min.css">
</head>

<body>

    <div class="jokenpo">

        <img src="img/Jo-Ken-Po.png" alt="Logo Jokenpô">


        <div class="area">
            <div class="pontuacao">
                <h4>VC</h4>
                <p id="pontos-jogador">0</p>
            </div>

            <div class="escolha">
                <img src="img/pedra.png" alt="Pedra" id="pedra">
                <img src="img/papel.png" alt="Papel" id="papel">
                <img src="img/tesoura.png" alt="Tesoura" id="tesoura">
            </div>
        </div>

        <button>Jogar</button>


        <div class="area">
            <div class="pontuacao">
                <h4>PC</h4>
                <p id="pontos-maquina">0</p>
            </div>

            <div class="escolha-pc">
                <img src="img/pedra.png" alt="Pedra" id="pedra-pc">
                <img src="img/papel.png" alt="Papel" id="papel-pc">
                <img src="img/tesoura.png" alt="Tesoura" id="tesoura-pc">
            </div>
        </div>

    </div>


    <script src="/js/script.js"></script>

</body>

</html>
